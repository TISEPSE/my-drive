<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudSpace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        background: #101922;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        animation: loaderFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .loader-cloud-icon {
        font-family: 'Material Symbols Outlined';
        font-size: 32px;
        color: #258cf4;
        font-variation-settings: 'FILL' 1;
        line-height: 1;
      }
      .loader-name {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.02em;
      }
      .loader-bar-track {
        width: 140px;
        height: 2px;
        background: #1e2a36;
        border-radius: 99px;
        overflow: hidden;
        margin-top: 32px;
        animation: loaderFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }
      .loader-bar-fill {
        height: 100%;
        width: 45%;
        background: linear-gradient(90deg, transparent, #258cf4, #60bfff, transparent);
        border-radius: 99px;
        animation: barSlide 1.4s ease-in-out infinite;
      }
      #root {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #root.ready {
        opacity: 1;
      }
      @keyframes loaderFadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes barSlide {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display overflow-hidden">
    <div id="loading-screen">
      <div class="loader-logo">
        <span class="loader-cloud-icon">cloud</span>
        <span class="loader-name">CloudSpace</span>
      </div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Wait for fonts + React to actually render, then hide loading screen
      function hideLoadingScreen() {
        var root = document.getElementById('root');
        var loading = document.getElementById('loading-screen');
        if (!root || !loading) return;
        root.classList.add('ready');
        loading.classList.add('hidden');
        setTimeout(function() { loading.remove(); }, 500);
      }

      // Poll until React has rendered real content inside #root
      async function waitForApp() {
        try { await document.fonts.ready; } catch (e) {}

        // Wait until #root has actual children (React has mounted)
        var maxWait = 10000; // 10s max
        var start = Date.now();
        await new Promise(function(resolve) {
          var check = setInterval(function() {
            var root = document.getElementById('root');
            if ((root && root.children.length > 0) || Date.now() - start > maxWait) {
              clearInterval(check);
              // Small extra delay for paint
              setTimeout(resolve, 200);
            }
          }, 50);
        });

        hideLoadingScreen();
      }
      waitForApp();
    </script>
  </body>
</html>
